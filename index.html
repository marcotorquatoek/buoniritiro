<!-- VERSION: 1.1.4 -->
<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Segnalazione Discordanze Resi</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-180.png">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="theme-color" content="#2563eb">
<style>
  body { font-family: Arial, sans-serif; max-width: 700px; margin: 20px auto; padding: 0 15px; background:#f5f5f5; }
  h1 { font-size: 20px; }
  .card { background:#fff; border-radius:8px; padding:16px; margin-bottom:16px; box-shadow:0 1px 3px rgba(0,0,0,.1); }
  label { display:block; margin-top:10px; font-weight:bold; font-size:14px; }
  input, textarea { width:100%; padding:8px; margin-top:4px; box-sizing:border-box; border:1px solid #ccc; border-radius:4px; font-size:16px; }
  #buono { font-size:26px; font-weight:bold; padding:14px; text-align:center; }
  #cameraBtn { display:block; width:100%; padding:22px; font-size:20px; font-weight:bold; background:#16a34a; color:#fff; border:none; border-radius:8px; margin-top:10px; }
  button { margin-top:14px; padding:10px 16px; background:#2563eb; color:#fff; border:none; border-radius:4px; cursor:pointer; font-size:14px; }
  button:disabled { background:#999; }
  .entry { border-bottom:1px solid #eee; padding:10px 0; }
  .entry:last-child { border-bottom:none; }
  .badge { background:#ef4444; color:#fff; font-size:11px; padding:2px 6px; border-radius:10px; margin-left:6px; }
  .meta { color:#666; font-size:12px; }
  .thumbs img { width:60px; height:60px; object-fit:cover; margin:4px 4px 0 0; border-radius:4px; }
  #status { font-size:13px; margin-top:8px; }
  .config-warning { background:#fef3c7; padding:10px; border-radius:6px; font-size:13px; }
  .tabbar { display:flex; margin:16px 0; border-radius:8px; overflow:hidden; box-shadow:0 1px 3px rgba(0,0,0,.1); }
  .tabbtn { flex:1; padding:12px; text-align:center; background:#e5e7eb; border:none; font-weight:bold; font-size:14px; cursor:pointer; }
  .tabbtn.active { background:#2563eb; color:#fff; }
  .quicklinks { display:flex; gap:8px; margin-bottom:16px; }
  .quicklinks a { flex:1; text-align:center; padding:10px; border-radius:8px; font-size:13px; font-weight:bold; text-decoration:none; }
  .link-drive { background:#fef3c7; color:#78350f; }
  .link-sheet { background:#d1fae5; color:#065f46; }
  .view { display:none; }
  .view.active { display:block; }
</style>
</head>
<body>

<h1>Segnalazione Discordanze Resi <span style="font-size:12px; color:#999; font-weight:normal;">v1.1.4</span></h1>

<div class="quicklinks">
  <a class="link-drive" href="https://drive.google.com/drive/folders/1lIHF58-xIimdBOYD72p9hb_8GcwHJ_tM" target="_blank">📁 Cartella Drive</a>
  <a class="link-sheet" href="https://docs.google.com/spreadsheets/d/1XR0sJps5bj7Mig1lw_dahgdm8urRAxfTsLo5UNYW_TQ/edit" target="_blank">📊 Apri Excel</a>
</div>

<div class="tabbar">
  <button class="tabbtn active" id="tabNewBtn" onclick="showView('new')">Nuova segnalazione</button>
  <button class="tabbtn" id="tabHistoryBtn" onclick="showView('history')">Storico</button>
</div>

<div id="viewNew" class="view active">

<div id="configWarning" class="config-warning" style="display:none;">
  Configura APPS_SCRIPT_URL nel file index.html (vedi istruzioni fornite).
</div>

<div class="card">
  <form id="reportForm">
    <label>Numero Buono di Ritiro *</label>
    <input type="text" id="buono" required>

    <label>Note</label>
    <textarea id="note" rows="3"></textarea>

    <label>Foto</label>
    <button type="button" id="cameraBtn" onclick="document.getElementById('cameraPhoto').click()">📷 APRI FOTOCAMERA</button>
    <input type="file" id="cameraPhoto" accept="image/*" capture="environment" style="display:none;">
    <input type="file" id="galleryPhotos" accept="image/*" multiple style="display:none;">
    <button type="button" onclick="document.getElementById('galleryPhotos').click()" style="display:block; width:100%; padding:10px; font-size:13px; font-weight:bold; background:#86efac; color:#064e3b; border:none; border-radius:8px; margin-top:8px;">Seleziona dalla galleria</button>
    <div id="thumbsPreview" class="thumbs"></div>

    <button type="submit" id="submitBtn" style="display:block; width:100%; padding:20px; font-size:20px; font-weight:bold; text-align:center; margin-top:18px;">INVIA SEGNALAZIONE</button>
    <div id="status"></div>
  </form>
</div>

</div>

<div id="viewHistory" class="view">
<div class="card">
  <h2 style="font-size:16px;">Segnalazioni recenti</h2>
  <div id="list">Caricamento...</div>
</div>
</div>

<script>
function showView(name) {
  document.getElementById("viewNew").classList.toggle("active", name === "new");
  document.getElementById("viewHistory").classList.toggle("active", name === "history");
  document.getElementById("tabNewBtn").classList.toggle("active", name === "new");
  document.getElementById("tabHistoryBtn").classList.toggle("active", name === "history");
  if (name === "history") loadList();
}

// ==== CONFIGURAZIONE: incolla qui l'URL del tuo Web App di Apps Script ====
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzreeaICF515jsy5cj-vnogH0id8j9gX_9INS2WxIs82nrXMGo1GAR7zblzBhTEGW1DMw/exec";
// ===========================================================================

const seenKey = "resi_seen_ids";
function getSeen() { return JSON.parse(localStorage.getItem(seenKey) || "[]"); }
function markSeen(id) {
  const s = getSeen();
  if (!s.includes(id)) { s.push(id); localStorage.setItem(seenKey, JSON.stringify(s)); }
}

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    const reader = new FileReader();
    reader.onload = (e) => { img.src = e.target.result; };
    reader.onerror = reject;
    img.onload = () => {
      const maxDim = 1600;
      let { width, height } = img;
      if (width > maxDim || height > maxDim) {
        const ratio = Math.min(maxDim / width, maxDim / height);
        width = Math.round(width * ratio);
        height = Math.round(height * ratio);
      }
      const canvas = document.createElement("canvas");
      canvas.width = width;
      canvas.height = height;
      canvas.getContext("2d").drawImage(img, 0, 0, width, height);
      const dataUrl = canvas.toDataURL("image/jpeg", 0.7);
      resolve({ name: file.name.replace(/\.[^.]+$/, "") + ".jpg", mime: "image/jpeg", data: dataUrl.split(",")[1] });
    };
    img.onerror = reject;
    reader.readAsDataURL(file);
  });
}

let capturedFiles = [];

function renderThumbs() {
  const box = document.getElementById("thumbsPreview");
  box.innerHTML = "";
  capturedFiles.forEach((f, idx) => {
    const url = URL.createObjectURL(f);
    const wrap = document.createElement("span");
    wrap.style.position = "relative";
    wrap.innerHTML = `<img src="${url}"><span style="position:absolute;top:-6px;right:2px;background:#ef4444;color:#fff;border-radius:50%;width:16px;height:16px;font-size:11px;text-align:center;cursor:pointer;">x</span>`;
    wrap.querySelector("span").addEventListener("click", () => { capturedFiles.splice(idx,1); renderThumbs(); });
    box.appendChild(wrap);
  });
}

document.getElementById("cameraPhoto").addEventListener("change", (e) => {
  capturedFiles.push(...e.target.files);
  e.target.value = "";
  renderThumbs();
});

document.getElementById("galleryPhotos").addEventListener("change", (e) => {
  capturedFiles.push(...e.target.files);
  e.target.value = "";
  renderThumbs();
});

document.getElementById("reportForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  if (!APPS_SCRIPT_URL || APPS_SCRIPT_URL.includes("INCOLLA_QUI")) {
    document.getElementById("configWarning").style.display = "block";
    return;
  }
  const btn = document.getElementById("submitBtn");
  const status = document.getElementById("status");
  btn.disabled = true;
  status.textContent = "Invio in corso...";

  const buono = document.getElementById("buono").value.trim();
  const note = document.getElementById("note").value.trim();
  const files = capturedFiles;

  try {
    const images = await Promise.all(files.map(fileToBase64));
    const resp = await fetch(APPS_SCRIPT_URL, {
      method: "POST",
      body: JSON.stringify({ action: "create", buono, note, images })
    });
    const data = await resp.json();
    if (data.ok) {
      status.textContent = "Segnalazione inviata correttamente.";
      document.getElementById("reportForm").reset();
      capturedFiles = [];
      renderThumbs();
      loadList();
    } else {
      status.textContent = "Errore: " + (data.error || "sconosciuto");
    }
  } catch (err) {
    status.textContent = "Errore di invio: " + err.message;
  } finally {
    btn.disabled = false;
  }
});

async function loadList() {
  const listEl = document.getElementById("list");
  if (!APPS_SCRIPT_URL || APPS_SCRIPT_URL.includes("INCOLLA_QUI")) {
    document.getElementById("configWarning").style.display = "block";
    listEl.textContent = "";
    return;
  }
  try {
    const resp = await fetch(APPS_SCRIPT_URL + "?action=list");
    const data = await resp.json();
    const seen = getSeen();
    listEl.innerHTML = "";
    (data.items || []).slice().reverse().forEach(item => {
      const isNew = !seen.includes(item.id);
      const div = document.createElement("div");
      div.className = "entry";
      div.innerHTML = `
        <strong>Buono: ${item.buono}</strong> ${isNew ? '<span class="badge">NUOVO</span>' : ''}
        <div class="meta">${new Date(item.date).toLocaleString("it-IT")}</div>
        <div>${item.note || ""}</div>
        ${item.folderUrl ? `<a href="${item.folderUrl}" target="_blank" style="display:inline-block; margin-top:6px; padding:8px 12px; background:#fbbf24; color:#000; border-radius:6px; font-weight:bold; text-decoration:none;">📁 Apri cartella Drive</a>` : `<div class="meta">Cartella non disponibile (segnalazione precedente all'aggiornamento)</div>`}
      `;
      listEl.appendChild(div);
      if (isNew) markSeen(item.id);
    });
    if (!data.items || data.items.length === 0) listEl.textContent = "Nessuna segnalazione.";
  } catch (err) {
    listEl.textContent = "Errore nel caricamento: " + err.message;
  }
}

document.getElementById("list").textContent = "Apri questa scheda per vedere le segnalazioni.";
</script>
</body>
</html>
